# ---- Server ----
server.port=8080

# ---- MySQL Datasource ----
# Update username/password to match your local MySQL setup.
# createDatabaseIfNotExist=true means you don't need to manually CREATE DATABASE first.
spring.datasource.url=jdbc:mysql://localhost:3306/feature_flag_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
# ddl-auto=update lets Hibernate create/evolve tables automatically from the
# entities - convenient for an assignment; in a real production system you'd
# use versioned migrations (Flyway/Liquibase) instead.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- Super Admin static credentials ----
# Per assignment: Super Admin uses static/config-based credentials, no DB row, no signup flow.
app.super-admin.username=admin
app.super-admin.password=admin123

# ---- JWT ----
# In a real deployment this secret would come from an environment variable /
# secrets manager, not a committed properties file.
app.jwt.secret=byepo-feature-flag-assignment-super-secret-key-change-me-1234567890
app.jwt.expiration-ms=86400000
